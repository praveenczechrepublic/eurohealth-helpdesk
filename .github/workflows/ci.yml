name: EuroHealth CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy pyyaml types-PyYAML
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports

  security:
    name: Security — No Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded API keys
        run: |
          if grep -rn "sk-[a-zA-Z0-9]" src/ tests/ --include="*.py"; then
            echo "❌ Hardcoded key found!"; exit 1
          fi
          if grep -rn "AKIA[A-Z0-9]" src/ tests/ --include="*.py"; then
            echo "❌ Hardcoded AWS key found!"; exit 1
          fi
          echo "✅ No hardcoded secrets"
      - name: Verify .env is gitignored
        run: |
          if git ls-files .env | grep -q ".env"; then
            echo "❌ .env is tracked by git!"; exit 1
          fi
          echo "✅ .env is gitignored"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Create test .env
        run: cp .env.example .env
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --cov=src --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build \
            --tag eurohealth-helpdesk:ci-${{ github.sha }} \
            .
          echo "✅ Docker build passed"
